name: Build patched Linux package

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-packages:
    name: Linux packages (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies and nfpm
        env:
          NFPM_VERSION: "2.46.3"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            gcc g++ clang libfontconfig-dev libwayland-dev \
            libxkbcommon-x11-dev libx11-xcb-dev \
            libssl-dev libzstd-dev pkg-config
          curl -fsSLo /tmp/nfpm.deb \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_amd64.deb"
          sudo dpkg -i /tmp/nfpm.deb

      - name: Build and package
        run: cargo run -p xtask -- linux package

      - name: Collect packages
        run: |
          mkdir -p dist
          for pkg in target/release/*.deb target/release/*.rpm; do
            [ -f "$pkg" ] || continue
            ext="${pkg##*.}"
            cp "$pkg" "dist/openlogi-fixed-linux-amd64.${ext}"
          done

      - uses: actions/upload-artifact@v7
        with:
          name: OpenLogi-fixed-linux-packages
          path: dist/*
